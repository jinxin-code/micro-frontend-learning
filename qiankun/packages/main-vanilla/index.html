<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>原生JS 主应用</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    
    .main-app { min-height: 100vh; background: #f5f5f5; }
    
    .nav-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 32px;
      background: #2c3e50;
      color: white;
    }
    
    .logo { font-size: 20px; font-weight: 600; }
    
    .nav-links {
      display: flex;
      gap: 24px;
      list-style: none;
    }
    
    .nav-links a {
      color: white;
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 4px;
      transition: background 0.3s;
    }
    
    .nav-links a:hover, .nav-links a.active {
      background: #34495e;
    }
    
    .content { padding: 24px; }
    
    .home { max-width: 1200px; margin: 0 auto; }
    .home h2 { margin-bottom: 32px; color: #2c3e50; }
    
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 24px;
      margin-bottom: 40px;
    }
    
    .card {
      background: white;
      padding: 24px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .card h3 { margin-bottom: 12px; color: #34495e; }
    .card p { margin-bottom: 8px; color: #7f8c8d; font-size: 14px; }
    
    .global-state-demo {
      background: white;
      padding: 24px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .global-state-demo h3 { margin-bottom: 16px; color: #34495e; }
    .global-state-demo p { margin-bottom: 16px; color: #7f8c8d; }
    .global-state-demo button {
      padding: 12px 24px;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.3s;
    }
    .global-state-demo button:hover { background: #2980b9; }
    
    #micro-container {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    #micro-container h2 {
      padding: 16px 24px;
      border-bottom: 1px solid #eee;
      margin: 0;
    }
    #micro-container > div {
      width: 100%;
      min-height: 500px;
    }
  </style>
</head>
<body>
  <div class="main-app">
    <nav class="nav-bar">
      <h1 class="logo">原生JS 主应用</h1>
      <ul class="nav-links">
        <li><a href="#" class="active" data-path="/">首页</a></li>
        <li><a href="#" data-path="/react">React 微应用</a></li>
        <li><a href="#" data-path="/vue">Vue 微应用</a></li>
        <li><a href="#" data-path="/static">静态微应用</a></li>
      </ul>
    </nav>
    <main class="content">
      <div id="page-content">
        <div class="home">
          <h2>欢迎来到原生JS主应用</h2>
          <div class="cards">
            <div class="card">
              <h3>🏠 主应用</h3>
              <p>基于原生 HTML/CSS/JS 构建</p>
              <p>直接使用 qiankun 原生 API</p>
            </div>
            <div class="card">
              <h3>⚛️ React 微应用</h3>
              <p>运行在 localhost:3000</p>
              <p>演示 React 技术栈接入</p>
            </div>
            <div class="card">
              <h3>💚 Vue 微应用</h3>
              <p>运行在 localhost:8081</p>
              <p>演示 Vue 技术栈接入</p>
            </div>
            <div class="card">
              <h3>📄 静态微应用</h3>
              <p>运行在 localhost:8082</p>
              <p>演示纯 HTML/JS 接入</p>
            </div>
          </div>
          <div class="global-state-demo">
            <h3>🌐 全局状态管理演示</h3>
            <p>点击按钮更新全局状态，所有微应用都能收到通知</p>
            <button id="update-btn">更新全局计数: <span id="count">0</span></button>
          </div>
        </div>
      </div>
      <div id="micro-container" style="display: none;"></div>
    </main>
  </div>

  <script src="./node_modules/qiankun/dist/index.umd.js"></script>
  <script>
    const { registerMicroApps, start, initGlobalState } = window.qiankun

    const microApps = [
      {
        name: 'react-app',
        entry: '//localhost:3000',
        container: '#micro-container > div',
        activeRule: '/react'
      },
      {
        name: 'vue-app',
        entry: '//localhost:8081',
        container: '#micro-container > div',
        activeRule: '/vue'
      },
      {
        name: 'static-app',
        entry: '//localhost:8082',
        container: '#micro-container > div',
        activeRule: '/static'
      }
    ]

    const actions = initGlobalState({
      count: 0,
      user: { name: 'Guest', role: 'visitor' },
      theme: 'light'
    })

    actions.onGlobalStateChange((state, prev) => {
      console.log('Global state changed:', prev, '->', state)
      const countEl = document.getElementById('count')
      if (countEl) countEl.textContent = state.count
    })

    let currentPath = '/'

    function navigate(path) {
      currentPath = path
      
      document.querySelectorAll('.nav-links a').forEach(a => {
        a.classList.toggle('active', a.dataset.path === path)
      })
      
      const pageContent = document.getElementById('page-content')
      const microContainer = document.getElementById('micro-container')
      
      if (path === '/') {
        pageContent.style.display = 'block'
        microContainer.style.display = 'none'
      } else {
        pageContent.style.display = 'none'
        microContainer.style.display = 'block'
        
        if (!microContainer.querySelector('div')) {
          const innerDiv = document.createElement('div')
          microContainer.appendChild(innerDiv)
        }
        
        const titles = { '/react': '⚛️ React 微应用', '/vue': '💚 Vue 微应用', '/static': '📄 静态微应用' }
        let titleEl = microContainer.querySelector('h2')
        if (!titleEl) {
          titleEl = document.createElement('h2')
          microContainer.insertBefore(titleEl, microContainer.firstChild)
        }
        titleEl.textContent = titles[path] || path
      }
      
      window.history.pushState({ path }, '', path)
    }

    document.querySelectorAll('.nav-links a').forEach(a => {
      a.addEventListener('click', (e) => {
        e.preventDefault()
        navigate(a.dataset.path)
      })
    })

    window.addEventListener('popstate', (e) => {
      if (e.state) {
        navigate(e.state.path)
      }
    })

    registerMicroApps(microApps, {
      beforeLoad: (app) => { console.log('before load:', app.name); return Promise.resolve() },
      beforeMount: (app) => { console.log('before mount:', app.name); return Promise.resolve() },
      afterMount: (app) => { console.log('after mount:', app.name); return Promise.resolve() },
      beforeUnmount: (app) => { console.log('before unmount:', app.name); return Promise.resolve() },
      afterUnmount: (app) => { console.log('after unmount:', app.name); return Promise.resolve() }
    })

    start({
      sandbox: { strictStyleIsolation: true }
    })

    document.getElementById('update-btn').addEventListener('click', () => {
      const countEl = document.getElementById('count')
      const count = parseInt(countEl.textContent) + 1
      countEl.textContent = count
      actions.setGlobalState({ count })
    })
  </script>
</body>
</html>
