<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>静态微应用</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    .static-app {
      padding: 24px;
      min-height: 100%;
    }
    
    .static-app h2 {
      color: #2c3e50;
      margin-bottom: 16px;
    }
    
    .static-app .description {
      color: #7f8c8d;
      margin-bottom: 24px;
    }
    
    .demo-section {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    
    .demo-section h3 {
      color: #34495e;
      margin-bottom: 12px;
    }
    
    .demo-section p {
      color: #7f8c8d;
      margin-bottom: 12px;
    }
    
    .color-box {
      width: 100px;
      height: 100px;
      border-radius: 8px;
      margin-bottom: 12px;
      transition: transform 0.3s;
    }
    
    .color-box:hover {
      transform: scale(1.1);
    }
    
    .colors {
      display: flex;
      gap: 16px;
    }
    
    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 12px;
    }
    
    .btn-group button {
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s;
    }
    
    .btn-primary {
      background: #3498db;
      color: white;
    }
    
    .btn-primary:hover {
      background: #2980b9;
    }
    
    .btn-success {
      background: #27ae60;
      color: white;
    }
    
    .btn-success:hover {
      background: #2ecc71;
    }
    
    .features ul {
      list-style: none;
    }
    
    .features li {
      padding: 8px 0;
      padding-left: 24px;
      position: relative;
      color: #7f8c8d;
    }
    
    .features li::before {
      content: '✓';
      position: absolute;
      left: 0;
      color: #27ae60;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="static-app">
    <h2>📄 静态微应用</h2>
    <p class="description">这是一个纯 HTML/CSS/JavaScript 的静态微应用</p>
    
    <div class="demo-section">
      <h3>交互演示</h3>
      <p>点击按钮改变文字颜色</p>
      <p id="text" style="font-size: 18px;">Hello, Qiankun!</p>
      <div class="btn-group">
        <button class="btn-primary" onclick="changeColor('red')">红色</button>
        <button class="btn-success" onclick="changeColor('green')">绿色</button>
        <button class="btn-primary" onclick="changeColor('blue')">蓝色</button>
      </div>
    </div>

    <div class="demo-section">
      <h3>颜色展示</h3>
      <div class="colors">
        <div class="color-box" style="background: #e74c3c;"></div>
        <div class="color-box" style="background: #3498db;"></div>
        <div class="color-box" style="background: #27ae60;"></div>
        <div class="color-box" style="background: #f39c12;"></div>
      </div>
    </div>

    <div class="demo-section features">
      <h3>功能特点</h3>
      <ul>
        <li>纯静态 HTML/CSS/JS</li>
        <li>无需构建工具</li>
        <li>最简单的接入方式</li>
        <li>运行在 localhost:8082</li>
      </ul>
    </div>
  </div>

  <script>
    window.__POWERED_BY_QIANKUN__ = window.__POWERED_BY_QIANKUN__ || false

    function changeColor(color) {
      const text = document.getElementById('text')
      if (text) {
        text.style.color = color
      }
    }

    window.bootstrap = function() {
      console.log('静态微应用 bootstrap')
      return Promise.resolve()
    }

    window.mount = function(props) {
      console.log('静态微应用 mount', props)
      return Promise.resolve()
    }

    window.unmount = function() {
      console.log('静态微应用 unmount')
      return Promise.resolve()
    }
  </script>
</body>
</html>
